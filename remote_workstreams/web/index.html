<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>remote-workstreams</title>
  <meta name="theme-color" content="#0a0c0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="workstreams">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
  <header id="topbar">
    <button id="btn-menu" type="button" aria-label="Settings" aria-expanded="false">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4.5 7h15M4.5 12h15M4.5 17h15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="state-chip" data-state="offline" aria-live="polite">
      <span class="chip-dot"></span>
      <span id="state-label">offline</span>
    </div>
    <button id="btn-lock" type="button" aria-label="Lock">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="5" y="10.5" width="14" height="9.5" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8.5 10.5V7.5a3.5 3.5 0 0 1 7 0v3M12 14.2v2.3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <div id="menu" hidden>
    <!-- Claude row then Codex row per target, both small→large so the tiers
         line up by column. The IDs live in remote_workstreams/engines.py. -->
    <div class="menu-row">
      <span class="menu-name">convo</span>
      <div class="menu-models" data-target="convo">
        <button type="button" data-model="sonnet">sonnet</button>
        <button type="button" data-model="opus">opus</button>
        <button type="button" data-model="fable">fable</button>
        <button type="button" class="codex" data-model="gpt-5.6-luna">luna</button>
        <button type="button" class="codex" data-model="gpt-5.6-terra">terra</button>
        <button type="button" class="codex" data-model="gpt-5.6-sol">sol</button>
      </div>
    </div>
    <!-- One pick drives both the stint planner and the injector. Two tiers
         only: opus thinks at high, luna at xhigh (efforts ride on the pick). -->
    <div class="menu-row">
      <span class="menu-name">plans</span>
      <div class="menu-models" data-target="plans">
        <button type="button" data-model="opus">opus</button>
        <button type="button" class="codex" data-model="gpt-5.6-luna">luna</button>
      </div>
    </div>
    <div class="menu-row">
      <span class="menu-name">new workstreams</span>
      <div class="menu-models" data-target="workstream">
        <button type="button" data-model="sonnet">sonnet</button>
        <button type="button" data-model="opus">opus</button>
        <button type="button" data-model="fable">fable</button>
        <button type="button" class="codex" data-model="gpt-5.6-luna">luna</button>
        <button type="button" class="codex" data-model="gpt-5.6-terra">terra</button>
        <button type="button" class="codex" data-model="gpt-5.6-sol">sol</button>
      </div>
    </div>
  </div>

  <div id="chat-wrap">
    <section id="chat" aria-live="polite">
      <p id="chat-empty">Say something. The conversation lands here.</p>
    </section>
    <button id="chat-jump" class="jump-latest" type="button" hidden aria-label="Jump to latest message">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v13M6.5 12.5 12 18l5.5-5.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div id="approvals" aria-live="assertive"></div>

  <section id="workstreams" aria-label="Workstreams"></section>
  <div id="ws-dots" aria-hidden="true"></div>

  <div id="actionbar">
    <button id="btn-plan" type="button">
      <span class="spin" aria-hidden="true"></span><span class="label">+ Workstream</span>
    </button>
    <button id="btn-compact" type="button">
      <span class="spin" aria-hidden="true"></span><span class="label">Compact</span>
    </button>
    <button id="btn-clear" type="button"><span class="label">Clear</span></button>
  </div>

  <!-- Resting row: mic mute | speaker hush | the keyboard pill. Tapping the pill
       swaps it for the real input + send; it comes back when the input blurs
       empty — typing is the rare path. -->
  <div id="composer">
    <button id="btn-mute" type="button" aria-label="Mute" aria-pressed="false">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="9" y="3" width="6" height="11" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18v3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line class="mute-slash" x1="4.5" y1="4.5" x2="19.5" y2="19.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
    <button id="btn-hush" type="button" aria-label="Hush replies" aria-pressed="false">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4.5 9.5v5h3.2l4.3 3.7V5.8L7.7 9.5z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M15.2 9.6a3.6 3.6 0 0 1 0 4.8M17.7 7.4a7 7 0 0 1 0 9.2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line class="hush-slash" x1="4.5" y1="4.5" x2="19.5" y2="19.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
    <input id="composer-input" type="text" hidden
           autocomplete="off" autocapitalize="sentences" enterkeyhint="send">
    <button id="composer-send" type="button" aria-label="Send" hidden>
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M4 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-keyboard" type="button" aria-label="Type instead">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="6.5" width="18" height="11.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M6.4 10h.01M9.8 10h.01M13.2 10h.01M16.6 10h.01M6.4 12.8h.01M9.8 12.8h.01M13.2 12.8h.01M16.6 12.8h.01M8.5 15.4h7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Workstream detail: tap a card to open. The compose bar queues typed
       messages straight into the session — the same paste path Send latest
       rides, so nothing forks. -->
  <section id="ws-detail" hidden>
    <header id="ws-detail-top">
      <button id="btn-ws-back" type="button" aria-label="Back to conversation">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14.5 5.5 8 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="ws-dot"></span>
      <span id="ws-detail-title" class="ws-title"></span>
      <span id="ws-detail-model" class="ws-model"></span>
      <span id="ws-detail-agents" class="ws-agents" hidden></span>
      <button id="ws-detail-end" class="ws-end" type="button" aria-label="End workstream">✕</button>
    </header>
    <div id="ws-log-wrap">
      <section id="ws-log" aria-live="polite">
        <p id="ws-log-empty">The workstream's transcript lands here.</p>
      </section>
      <button id="ws-jump" class="jump-latest" type="button" hidden aria-label="Jump to latest message">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v13M6.5 12.5 12 18l5.5-5.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <!-- Mirrors the main composer: Compact (doubling as the context meter)
         where the mics sit, then the keyboard pill that unfolds into the
         input. Send latest and Check in stay hub verbs — the log below IS
         the check-in. -->
    <div id="ws-composer">
      <button id="ws-detail-compact" class="ws-compact" type="button">Compact</button>
      <input id="ws-input" type="text" hidden
             autocomplete="off" autocapitalize="sentences" enterkeyhint="send">
      <button id="ws-composer-send" type="button" aria-label="Send to workstream" hidden>
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M4 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="ws-keyboard" type="button" aria-label="Type to the workstream">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="6.5" width="18" height="11.5" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6.4 10h.01M9.8 10h.01M13.2 10h.01M16.6 10h.01M6.4 12.8h.01M9.8 12.8h.01M13.2 12.8h.01M16.6 12.8h.01M8.5 15.4h7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </section>
</div>

<div id="toast" hidden></div>

<section id="screen-login" class="screen" hidden>
  <p class="wordmark">remote<span>-</span>workstreams</p>
  <div class="orb" data-state="listening" aria-hidden="true">
    <div class="orb-halo"></div>
    <div class="orb-ring ring-a"></div>
    <div class="orb-core"></div>
  </div>
  <button id="login-unlock" type="button">Unlock with Face&nbsp;ID</button>
  <button id="login-pair" type="button" class="screen-link">Pair this device</button>
</section>

<section id="screen-pairing" class="screen" hidden>
  <form id="pair-form" autocomplete="off">
    <p class="wordmark">remote<span>-</span>workstreams</p>
    <h1>Pair this device</h1>
    <p class="pair-copy">Enter the PIN chosen when the Mac was set up, then confirm with Face&nbsp;ID.</p>
    <label for="pair-pin">pin</label>
    <input id="pair-pin" type="text" class="pin" required inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;">
    <button id="pair-submit" type="submit">Continue with Face&nbsp;ID</button>
    <button id="pair-back" type="button" class="screen-link">Back to unlock</button>
    <p id="pair-error" hidden></p>
  </form>
</section>

<script type="module" src="app.js"></script>
</body>
</html>
